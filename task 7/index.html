<!DOCTYPE html>
<html>
<head>
    <title>Interactive Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Customer Feedback Form</h2>

<form id="feedbackForm">

<label>Name:</label>
<input type="text" id="name" onkeypress="validateName(event)">

<label>Email:</label>
<input type="email" id="email" onkeypress="validateEmail(event)">

<label>Feedback:</label>
<textarea id="feedback"></textarea>

<button type="button" ondblclick="submitForm()">Submit</button>

</form>

<script src="script.js"></script>

</body>
</html>
