<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Recruiter Dashboard')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Welcome, <span th:text="${user.name}">Recruiter</span>!</h2>
            <a href="/recruiter/post-job" class="btn btn-primary">+ Post New Job</a>
        </div>

        <div th:if="${param.success}" class="alert alert-success">
            Job posted successfully!
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">Your Job Postings</h4>
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(jobs)}" class="text-center p-4">
                    <p class="text-muted">You haven't posted any jobs yet.</p>
                </div>
                
                <table class="table table-hover align-middle" th:unless="${#lists.isEmpty(jobs)}">
                    <thead class="table-light">
                        <tr>
                            <th>Job Title</th>
                            <th>Posted On</th>
                            <th>Salary</th>
                            <th>Applicants</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}">
                            <td class="fw-bold text-primary" th:text="${job.title}">Software Engineer</td>
                            <td th:text="${#calendars.format(job.postedDate, 'dd MMM yyyy')}">01 Jan 2026</td>
                            <td th:text="${job.salary}">100k</td>
                            <td>
                                <span class="badge bg-info text-dark rounded-pill" th:text="${#lists.size(job.applications)} + ' applicants'">0</span>
                            </td>
                            <td>
                                <a th:href="@{'/recruiter/job/' + ${job.id} + '/applicants'}" class="btn btn-sm btn-outline-primary">View Applicants</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
