<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Post a Job')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Post a New Job</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/recruiter/post-job}" th:object="${job}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Job Title</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" required placeholder="e.g., Senior Full Stack Developer">
                            </div>

                            <div class="mb-3">
                                <label for="salary" class="form-label">Salary / Compensation</label>
                                <input type="text" class="form-control" id="salary" th:field="*{salary}" placeholder="e.g., $100,000 - $130,000 or 'Competitive'">
                            </div>

                            <div class="mb-3">
                                <label for="skills" class="form-label">Required Skills (Comma separated)</label>
                                <input type="text" class="form-control" id="skills" th:field="*{skillsRequired}" placeholder="e.g., Java, Spring Boot, React">
                            </div>

                            <div class="mb-4">
                                <label for="description" class="form-label">Job Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="6" required placeholder="Describe the role, responsibilities, and requirements..."></textarea>
                            </div>

                            <div class="d-flex justify-content-end">
                                <a href="/recruiter/dashboard" class="btn btn-outline-secondary me-2">Cancel</a>
                                <button type="submit" class="btn btn-primary px-4">Post Job</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
