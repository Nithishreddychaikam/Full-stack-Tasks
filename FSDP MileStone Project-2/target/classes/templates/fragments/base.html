<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Job Portal</title>
    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, #f7f9fc 45%, #eefaf5 100%);
            min-height: 100vh;
        }
        .navbar-brand {
            font-weight: 700;
            color: #0d6efd !important;
        }
        .navbar {
            border-bottom: 1px solid #e6ebf5;
        }
        .hero-card {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid #e8edf7;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(41, 58, 92, 0.08);
            backdrop-filter: blur(3px);
        }
        .hero-button-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .project-carousel img {
            height: 420px;
            object-fit: cover;
            border-radius: 16px;
        }
    </style>
</head>
<body>

<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">JobPortal AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="btn btn-primary ms-2" href="/register">Register</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('CANDIDATE')">
                        <a class="nav-link" href="/candidate/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('RECRUITER')">
                        <a class="nav-link" href="/recruiter/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/dashboard">Admin Panel</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-outline-danger ms-2">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
