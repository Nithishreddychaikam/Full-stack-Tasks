<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Job Portal - Home')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <div class="container mt-5 mb-5">
        <div class="hero-card p-4 p-md-5 text-center">
        <h1 class="display-4 fw-bold mb-3">Find Your Dream Job Today</h1>
        <p class="lead mb-4">The ultimate AI-driven platform to connect top talent with industry-leading candidates.</p>
        <div class="hero-button-group mb-4">
            <a href="/register" class="btn btn-primary btn-lg px-4 me-md-2">Get Started</a>
            <a href="/login" class="btn btn-outline-secondary btn-lg px-4">Login</a>
        </div>

        <div id="projectCarousel" class="carousel slide project-carousel" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#projectCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#projectCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#projectCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner rounded-4 shadow">
                <div class="carousel-item active">
                    <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1400&q=80" class="d-block w-100" alt="Hiring team collaboration">
                </div>
                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1400&q=80" class="d-block w-100" alt="Professional interview process">
                </div>
                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1400&q=80" class="d-block w-100" alt="Career growth and recruitment">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#projectCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#projectCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
