<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Admin Dashboard')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <div class="container mt-4">
        <h2 class="mb-4">Admin Control Panel</h2>

        <div th:if="${param.userDeleted}" class="alert alert-success">User deleted successfully.</div>
        <div th:if="${param.jobDeleted}" class="alert alert-success">Job deleted successfully.</div>

        <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button" role="tab">Manage Users</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="jobs-tab" data-bs-toggle="tab" data-bs-target="#jobs" type="button" role="tab">Manage Jobs</button>
            </li>
        </ul>

        <div class="tab-content" id="adminTabsContent">
            <!-- Users Tab -->
            <div class="tab-pane fade show active" id="users" role="tabpanel">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u : ${users}">
                                        <td th:text="${u.id}">1</td>
                                        <td class="fw-bold" th:text="${u.name}">Name</td>
                                        <td th:text="${u.email}">email@test.com</td>
                                        <td>
                                            <span class="badge bg-secondary" th:text="${u.role}">ROLE</span>
                                        </td>
                                        <td>
                                            <form th:action="@{'/admin/delete-user/' + ${u.id}}" method="post" th:if="${u.role != 'ROLE_ADMIN'}" onsubmit="return confirm('Are you sure you want to delete this user?');">
                                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Jobs Tab -->
            <div class="tab-pane fade" id="jobs" role="tabpanel">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Job Title</th>
                                        <th>Company</th>
                                        <th>Date Posted</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="job : ${jobs}">
                                        <td th:text="${job.id}">1</td>
                                        <td class="fw-bold text-primary" th:text="${job.title}">Title</td>
                                        <td th:text="${job.employer.name}">Employer</td>
                                        <td th:text="${#calendars.format(job.postedDate, 'dd MMM yyyy')}">Date</td>
                                        <td>
                                            <form th:action="@{'/admin/delete-job/' + ${job.id}}" method="post" onsubmit="return confirm('Are you sure you want to delete this job?');">
                                                <button type="submit" class="btn btn-sm btn-danger">Remove</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
