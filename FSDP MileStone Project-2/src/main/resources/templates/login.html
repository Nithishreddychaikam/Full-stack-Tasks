<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Login - Job Portal')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow border-0 rounded-pilled">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 font-weight-bold">Welcome Back</h3>
                        
                        <div th:if="${param.error}" class="alert alert-danger">
                            Invalid email or password.
                        </div>
                        <div th:if="${param.success}" class="alert alert-success">
                            Registration successful! Please login.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="form-group mb-3">
                                <label for="username" class="form-label">Email address</label>
                                <input type="email" id="username" name="username" class="form-control" required autofocus>
                            </div>
                            <div class="form-group mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password" class="form-control" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-block">Sign in</button>
                            </div>
                        </form>
                        <div class="text-center mt-3">
                            <p>Don't have an account? <a href="/register">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
