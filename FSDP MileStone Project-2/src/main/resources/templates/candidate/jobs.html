<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Browse Jobs')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <div class="container mt-4">
        <h2 class="mb-4">Available Jobs</h2>
        
        <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
        
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form action="/candidate/jobs" method="get" class="row g-3">
                    <div class="col-md-10">
                        <input type="text" name="keyword" class="form-control" placeholder="Search by title or skills..." th:value="${keyword}">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4" th:each="job : ${jobs}">
                <div class="card h-100 shadow-sm transition-hover">
                    <div class="card-body">
                        <h4 class="card-title text-primary" th:text="${job.title}">Job Title</h4>
                        <h6 class="card-subtitle mb-2 text-muted" th:text="${job.employer.name}">Company Name</h6>
                        
                        <div class="mt-3 mb-3">
                            <span class="badge bg-light text-dark border me-2">Salary: <span th:text="${job.salary}">Negotiable</span></span>
                        </div>
                        
                        <p class="card-text text-truncate" style="max-height: 3rem;" th:text="${job.description}">Description...</p>
                        
                        <div class="mb-3">
                            <strong>Skills: </strong> <span class="text-muted" th:text="${job.skillsRequired}">Java, Spring Boot</span>
                        </div>
                        
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center">
                        <small class="text-muted">Posted on: <span th:text="${#calendars.format(job.postedDate, 'dd MMM yyyy')}"></span></small>
                        <form th:action="@{'/candidate/apply/' + ${job.id}}" method="post">
                            <button type="submit" class="btn btn-sm btn-success">Apply Now</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(jobs)}" class="col-12 text-center p-5">
                <h4 class="text-muted">No jobs found matching your criteria.</h4>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .transition-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,.1) !important;
            transition: all 0.3s ease;
        }
    </style>
</body>
</html>
